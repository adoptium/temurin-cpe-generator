---
    name: CI
    
    on:
      push:
        branches: [ main ]
      pull_request:
        branches: [ main ]
    
    permissions:
      contents: read
    
    jobs:
      ci:
        name: Run CI
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    
          - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
            with:
              node-version: 20
              cache: npm
    
          - run: npm install
    
          - run: node generator.js
